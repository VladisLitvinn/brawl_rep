services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brawl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brawl}
      POSTGRES_DB: ${POSTGRES_DB:-brawl}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 3s
      timeout: 3s
      retries: 5
    # 512 MB RAM на сервере: Postgres минимально
    mem_limit: 128m
    cpus: 1

  app:
    build: .
    ports:
      - "8888:8888"
    environment:
      NODE_ENV: production
      # Берутся из .env или дефолты (важно: user должен совпадать с POSTGRES_USER)
      PGHOST: ${PGHOST:-postgres}
      PGUSER: ${PGUSER:-brawl}
      PGPASSWORD: ${PGPASSWORD:-brawl}
      PGDATABASE: ${PGDATABASE:-brawl}
      # English Exercise (Learn words by chunks) — опционально, для генерации упражнений через OpenRouter
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-8}
      PG_POOL_MAX: ${PG_POOL_MAX:-2}
      NODE_OPTIONS: ${NODE_OPTIONS:-"--max-old-space-size=224"}
    depends_on:
      postgres:
        condition: service_healthy
    # 512 MB RAM: app 320m + postgres 128m ≈ 450m, остальное — ОС
    mem_limit: 320m
    cpus: 1

volumes:
  pgdata:
