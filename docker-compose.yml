services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brawl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brawl}
      POSTGRES_DB: ${POSTGRES_DB:-brawl}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8888:8888"
      - "8100:8888"   # тот же сервер: Brawl на :8888, English можно открыть как http://localhost:8100/english
    environment:
      NODE_ENV: production
      # Берутся из .env или дефолты (важно: user должен совпадать с POSTGRES_USER)
      PGHOST: ${PGHOST:-postgres}
      PGUSER: ${PGUSER:-brawl}
      PGPASSWORD: ${PGPASSWORD:-brawl}
      PGDATABASE: ${PGDATABASE:-brawl}
      # English Exercise (Learn words by chunks) — опционально, для генерации упражнений через OpenRouter
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
